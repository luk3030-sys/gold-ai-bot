services:
  - type: web
    name: gold-ai-bot-v6
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SYMBOL
        value: XAU/USD
      - key: SCHEDULER_ENABLED
        value: true
      - key: CLOSED_CANDLES_ONLY
        value: true
      - key: RUN_INTERVAL_MINUTES
        value: 15
      - key: MIN_SCORE_TO_ALERT
        value: 75

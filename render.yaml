services:
  - type: web
    name: gold-ai-bot-v5-1
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 2 --timeout 120 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: USE_CLOSED_CANDLES
        value: "true"
      - key: SCHEDULER_ENABLED
        value: "false"
